{% extends 'base.html' %}

{% block content %}

    <!-- Lesson Header -->

            {{ lesson.title }}
        </h1>
        <p class="text-neutral-600 max-w-3xl">
            {{ lesson.description }}
        </p>
    </div>

    <!-- Lesson Content Card -->

    </div>
