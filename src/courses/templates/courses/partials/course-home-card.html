<div class="group bg-white border border-neutral-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition">

    <!-- Image -->
    <div class="h-44 bg-neutral-100 overflow-hidden">
        {% if course.get_image %}
        <img src="{{ course.get_image }}" alt="{{ course.title }}"
            class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
        {% else %}
        <div class="w-full h-full flex items-center justify-center text-muted text-sm">
            No Image
        </div>
        {% endif %}
    </div>

    <!-- Content -->
    <div class="p-4 space-y-3">
        <h3 class="font-semibold text-neutral-800 line-clamp-1">
            {{ course.title }}
        </h3>

        <p class="text-sm text-neutral-600 line-clamp-2">
            {{ course.description|default:"No description available." }}
        </p>

        <div class="flex items-center justify-between pt-2">
            <span class="text-xs px-2 py-1 rounded-md bg-accent text-white">
                {{ course.lessons.count }} Lessons
            </span>

            <a href="{% url 'course-detail' course.id %}"
                class="text-primary text-sm font-medium hover:underline flex items-center gap-1">
                View
                <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>

</div>
